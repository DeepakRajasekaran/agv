path_follower_node:
  ros__parameters:
    pid:
      kp: 1.5
      ki: 0.02
      kd: 0.12
      windup_limit: 0.5
      max_output: 1.5
    robot:
      max_rpm: 150.0
      wheel_base: 0.512
      wheel_radius: 0.08
      sensor_offset_x: 0.48
    safety:
      lost_threshold: 0.25
      max_frozen_steps: 50
      turn_duration: 3.0
    velocity_clamps:
      straight: 1.0
      junction: 0.15
      turn: 0.10
      high_error: 0.10
      high_error_threshold: 0.05
    junction:
      divergence_threshold: 0.02
