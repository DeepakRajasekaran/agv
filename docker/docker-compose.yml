version: '3.8'

services:
  roboteq_driver:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: roboteq_driver_hardware
    # network_mode: host is required to access native SocketCAN interfaces (e.g., can0) from within the container
    network_mode: host
    privileged: true
    # We NO LONGER mount `src/` to ensure this runs perfectly on target hardware with only compiled binaries.
    # The container will automatically launch `roboteq_driver.launch.py` via entrypoint CMD
