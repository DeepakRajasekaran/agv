
services:
  agv:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${BUILD_MODE:-deployment}
    image: roboteq_driver_hardware:latest
    container_name: agv
    # network_mode: host is required to access native SocketCAN interfaces (e.g., can0) from within the container
    network_mode: host
    privileged: true
