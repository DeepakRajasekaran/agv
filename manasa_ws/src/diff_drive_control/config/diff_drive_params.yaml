diff_drive_controller_node:
  ros__parameters:
    wheel_base: 0.512        # meters - distance between left and right wheel centers
    wheel_dia: 0.16         # meters - wheel diameter
    gear_ratio: 10.0        # motor shaft revolutions per 1 wheel revolution
    max_motor_rpm: 300.0    # clamp commanded RPM; set to 0.0 to disable clamping
    odom_frame: "odom"
    base_frame: "base_link"
    publish_tf: true
    cmd_vel_timeout: 0.5    # seconds before publishing zero RPM (keyboard safety stop)
