line_follower:
  ros__parameters:
    teleop_input_topic: "/teleop_cmd_vel"
    corrected_output_topic: "/cmd_vel"
    sensor_track_topic: "/mgs/selected_track"
    
    pid:
      p: 2.8
      i: 0.0000
      d: 0.1
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      
    max_angular_correction: 0.5
    max_linear_velocity: 1.0
    max_angular_velocity: 1.0
    error_deadband_mm: 1.0
    control_rate_hz: 50.0
    pid_enabled: true

    turn_linear_velocity: 0.05

navigation_bt_node:
  ros__parameters:
    bt_xml_file: "/home/ar/ros2/agv/manasa_ws/src/line_follower/config/line_follower_tree.xml"
