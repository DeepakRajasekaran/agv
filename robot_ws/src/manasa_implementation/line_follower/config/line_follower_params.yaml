line_follower:
  ros__parameters:
    teleop_input_topic: "/teleop_cmd_vel"
    corrected_output_topic: "/cmd_vel"
    sensor_track_topic: "/mgs/selected_track"
    
    pid:
      p: 3.5
      i: 0.0000
      d: 0.08
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      
    max_angular_correction: 0.5
    max_linear_velocity: 1.0
    max_angular_velocity: 1.0
    error_deadband_mm: 1.0
    control_rate_hz: 50.0
    pid_enabled: true
    
    # State-based linear velocities
    auto_linear_velocity: 0.4    # FOLLOW_LINE (straight)
    turn_linear_velocity: 0.2    # TURN and JUNCTION

    # Marker pipeline
    marker_debounce_ms: 40.0       # raw marker must hold this long to flip (flicker reject)
    marker_sync_window_ms: 50.0    # lone-marker grace period to pair into a junction

navigation_bt_node:
  ros__parameters:
    bt_xml_file: "line_follower_tree.xml"
