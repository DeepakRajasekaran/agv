version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: map_postgres
    environment:
      POSTGRES_USER: nav_user
      POSTGRES_PASSWORD: nav_password
      POSTGRES_DB: map_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
