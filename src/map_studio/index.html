<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGV-OS Map Studio</title>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#735c00",
                        "on-secondary-container": "#00311f",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "on-primary-fixed-variant": "#574500",
                        "outline": "#9a9078",
                        "on-surface-variant": "#d1c6ab",
                        "outline-variant": "#4d4632",
                        "surface-bright": "#31394d",
                        "surface-dim": "#0b1326",
                        "surface-container": "#171f33",
                        "surface-variant": "#2d3449",
                        "secondary-fixed": "#6ffbbe",
                        "surface": "#0b1326",
                        "tertiary": "#ffe8e6",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#060e20",
                        "tertiary-container": "#ffc2bd",
                        "secondary": "#4edea3",
                        "background": "#0b1326",
                        "primary": "#ffecb9",
                        "primary-fixed-dim": "#eec200",
                        "on-primary-container": "#6c5700",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-tint": "#eec200",
                        "on-tertiary": "#68000a",
                        "on-background": "#dae2fd",
                        "on-error": "#690005",
                        "on-tertiary-container": "#b2131f",
                        "surface-container-high": "#222a3d",
                        "secondary-container": "#00a572",
                        "on-tertiary-fixed-variant": "#930013",
                        "error": "#ffb4ab",
                        "primary-fixed": "#ffe083",
                        "tertiary-fixed": "#ffdad7",
                        "on-secondary-fixed": "#002113",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#2d3449",
                        "inverse-on-surface": "#283044",
                        "surface-container-low": "#131b2e",
                        "on-tertiary-fixed": "#410004",
                        "on-primary": "#3c2f00",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary": "#003824",
                        "primary-container": "#facc15",
                        "on-surface": "#dae2fd",
                        "inverse-surface": "#dae2fd",
                        "on-primary-fixed": "#231b00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "panel-padding": "20px",
                        "lg": "24px",
                        "sm": "8px",
                        "base": "4px",
                        "gutter": "16px",
                        "xs": "4px",
                        "md": "16px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "headline-sm": ["JetBrains Mono", "monospace"],
                        "data-mono": ["JetBrains Mono", "monospace"],
                        "headline-md": ["JetBrains Mono", "monospace"],
                        "label-caps": ["JetBrains Mono", "monospace"],
                        "label-sm": ["Inter", "sans-serif"],
                        "headline-lg": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600" }],
                        "data-mono": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
  </head>
  <body class="bg-surface dark:bg-surface text-on-surface h-screen overflow-hidden flex flex-col font-body-md select-none">
    <div id="root" class="h-full w-full flex flex-col"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
