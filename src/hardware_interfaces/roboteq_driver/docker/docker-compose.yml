version: '3.8'

services:
  roboteq_driver:
    build: .
    container_name: roboteq_driver_test
    # network_mode: host is required to access native SocketCAN interfaces (e.g., can0) from within the container
    network_mode: host
    privileged: true
    volumes:
      # Mount the workspace so that we can build and test live code
      - ../../../../:/ros2_ws
    # Build and launch the driver node by default
    command: >
      bash -c "colcon build --packages-select roboteq_driver custom_interfaces && 
               source install/setup.bash && 
               ros2 run roboteq_driver roboteq_driver_node --ros-args --params-file /ros2_ws/src/hardware_interfaces/roboteq_driver/config/params.yaml"
